name: Deploy Web App To VPS

on:
  push:
    branches: ["main"]
    paths:
      - "web/frontend/**"
      - "web/backend/**"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_ED25519_FINGERPRINT: "SHA256:61jcOe3NCRHFx17LH9S2hj+hPSfdlvMjMIyf0CTDaUU"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/frontend/package-lock.json

      - name: Build frontend
        working-directory: web/frontend
        run: |
          npm ci
          npm run build
          ls -1 dist/assets

      - name: Create release archive
        run: |
          tar \
            --exclude-vcs \
            --exclude='./web/frontend/node_modules' \
            --exclude='./web/backend/.venv' \
            --exclude='./web/backend/web_app.db' \
            -czf /tmp/auto-reg-release.tgz .

      - name: Install SSH tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Verify host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$VPS_PORT" -t ed25519 "$VPS_HOST" > ~/.ssh/known_hosts.tmp
          actual_fingerprint="$(ssh-keygen -lf ~/.ssh/known_hosts.tmp -E sha256 | awk 'NR==1 { print $2 }')"
          if [ "$actual_fingerprint" != "$VPS_ED25519_FINGERPRINT" ]; then
            echo "Unexpected SSH fingerprint: $actual_fingerprint"
            exit 1
          fi
          cat ~/.ssh/known_hosts.tmp >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload release archive
        run: |
          sshpass -p "$VPS_PASSWORD" \
            scp \
            -P "$VPS_PORT" \
            /tmp/auto-reg-release.tgz \
            "$VPS_USER@$VPS_HOST:/tmp/auto-reg-release-${GITHUB_SHA}.tgz"

      - name: Deploy on VPS
        run: |
          sshpass -p "$VPS_PASSWORD" \
            ssh \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" \
            "DEPLOY_SHA='${GITHUB_SHA}' bash -s" <<'REMOTE'
          set -euo pipefail

          APP_DIR=""
          for candidate in /opt/auto-reg /srv/auto-reg /root/auto-reg /var/www/auto-reg /home/auto-reg; do
            if [ -f "$candidate/web/backend/app/main.py" ]; then
              APP_DIR="$candidate"
              break
            fi
          done

          if [ -z "$APP_DIR" ]; then
            found_backend="$(find /opt /srv /root /var/www /home -maxdepth 5 -type f -path '*/web/backend/app/main.py' 2>/dev/null | head -n 1 || true)"
            if [ -n "$found_backend" ]; then
              APP_DIR="$(dirname "$(dirname "$(dirname "$(dirname "$found_backend")")")")"
            fi
          fi

          if [ -z "$APP_DIR" ]; then
            APP_DIR="/opt/auto-reg"
          fi

          RELEASE_ARCHIVE="/tmp/auto-reg-release-${DEPLOY_SHA}.tgz"
          RELEASE_DIR="/tmp/auto-reg-release-${DEPLOY_SHA}"

          add_frontend_root() {
            local candidate_root="${1:-}"
            [ -n "$candidate_root" ] || return 0
            candidate_root="${candidate_root%/}"
            [ -n "$candidate_root" ] || return 0
            for existing_root in "${FRONTEND_ROOTS[@]:-}"; do
              if [ "$existing_root" = "$candidate_root" ]; then
                return 0
              fi
            done
            FRONTEND_ROOTS+=("$candidate_root")
          }

          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR" "$APP_DIR"
          tar -xzf "$RELEASE_ARCHIVE" -C "$RELEASE_DIR"

          apt-get update
          apt-get install -y python3 python3-venv python3-pip curl rsync
          if ! command -v nginx >/dev/null 2>&1; then
            apt-get install -y nginx
          fi

          rsync -a --delete \
            --exclude='.git' \
            --exclude='web/backend/web_app.db' \
            --exclude='web/backend/.env' \
            --exclude='web/backend/.venv' \
            "$RELEASE_DIR/" "$APP_DIR/"

          cd "$APP_DIR/web/backend"
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

          SERVICE_NAME=""
          while read -r service_name; do
            [ -n "$service_name" ] || continue
            unit_body="$(systemctl cat "$service_name" 2>/dev/null || true)"
            if printf '%s\n' "$unit_body" | grep -q "$APP_DIR/web/backend"; then
              SERVICE_NAME="$service_name"
              break
            fi
            if printf '%s\n' "$unit_body" | grep -q 'uvicorn .*app.main:app'; then
              SERVICE_NAME="$service_name"
              break
            fi
          done < <(systemctl list-unit-files --type=service --no-legend | awk '{print $1}')

          if [ -z "$SERVICE_NAME" ]; then
            SERVICE_NAME="auto-reg-backend.service"
            printf '%s\n' \
              '[Unit]' \
              'Description=Auto-reg Web Backend' \
              'After=network.target' \
              '' \
              '[Service]' \
              'Type=simple' \
              "WorkingDirectory=$APP_DIR/web/backend" \
              "ExecStart=$APP_DIR/web/backend/.venv/bin/uvicorn app.main:app --host 127.0.0.1 --port 8000" \
              'Restart=always' \
              'RestartSec=3' \
              'User=root' \
              '' \
              '[Install]' \
              'WantedBy=multi-user.target' \
              > "/etc/systemd/system/$SERVICE_NAME"
            systemctl daemon-reload
            systemctl enable "$SERVICE_NAME"
          fi

          systemctl restart "$SERVICE_NAME"

          SOURCE_FRONTEND_DIST="$APP_DIR/web/frontend/dist"
          FRONTEND_ROOTS=()
          add_frontend_root "/var/www/html"

          while read -r existing_index; do
            [ -n "$existing_index" ] || continue
            add_frontend_root "$(dirname "$existing_index")"
          done < <(find /var/www /opt /srv /home /root /usr/share/nginx -maxdepth 8 -type f -name index.html -exec grep -l 'Auto-reg Web' {} + 2>/dev/null || true)

          while read -r docker_index; do
            [ -n "$docker_index" ] || continue
            add_frontend_root "$(dirname "$docker_index")"
          done < <(find /var/lib/docker/overlay2 -maxdepth 8 -type f -path '*/merged/usr/share/nginx/html/index.html' -exec grep -l 'Auto-reg Web' {} + 2>/dev/null || true)

          while read -r config_file; do
            [ -n "$config_file" ] || continue
            while read -r config_root; do
              [ -n "$config_root" ] || continue
              add_frontend_root "$config_root"
            done < <(awk '/^[[:space:]]*root[[:space:]]+/ { gsub(";", "", $2); print $2 }' "$config_file")
          done < <(grep -RilE 'server_name[[:space:]].*ultra-connection\.xyz|proxy_pass[[:space:]]+http://127\.0\.0\.1:8000' /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null || true)

          if [ "${#FRONTEND_ROOTS[@]}" -eq 1 ]; then
            while read -r candidate_root; do
              [ -n "$candidate_root" ] || continue
              add_frontend_root "$candidate_root"
            done < <(grep -Rhs 'root ' /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null | awk '/root / { print $2 }' | tr -d ';')
          fi

          echo "NGINX_MATCHES_BEGIN"
          grep -RinE 'server_name[[:space:]].*ultra-connection\.xyz|root[[:space:]]+|proxy_pass[[:space:]]+' /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null || true
          echo "NGINX_MATCHES_END"
          echo "NGINX_T_SUMMARY_BEGIN"
          nginx -T 2>/dev/null | grep -nE 'server_name|root[[:space:]]+|listen[[:space:]]+' || true
          echo "NGINX_T_SUMMARY_END"
          echo "AUTO_REG_INDEXES_BEGIN"
          find /var/www /opt /srv /home /root /usr/share/nginx -maxdepth 8 -type f -name index.html -exec grep -l 'Auto-reg Web' {} + 2>/dev/null || true
          echo "AUTO_REG_INDEXES_END"
          echo "DOCKER_FRONTEND_ROOTS_BEGIN"
          find /var/lib/docker/overlay2 -maxdepth 8 -type f -path '*/merged/usr/share/nginx/html/index.html' -exec grep -l 'Auto-reg Web' {} + 2>/dev/null || true
          echo "DOCKER_FRONTEND_ROOTS_END"
          echo "STALE_ASSETS_BEGIN"
          find / -maxdepth 12 -type f -path '*/assets/index-DvOd-gut.js' 2>/dev/null || true
          echo "STALE_ASSETS_END"

          ACTIVE_FRONTEND_ROOT=""
          for root_dir in "${FRONTEND_ROOTS[@]}"; do
            if [[ "$root_dir" == "$RELEASE_DIR" || "$root_dir" == "$RELEASE_DIR/"* || "$root_dir" == "$APP_DIR/web/frontend" || "$root_dir" == "$SOURCE_FRONTEND_DIST" || "$root_dir" == "$APP_DIR/web/frontend/"* ]]; then
              echo "Skipping app frontend path $root_dir"
              continue
            fi
            mkdir -p "$root_dir"
            rsync -a --delete "$APP_DIR/web/frontend/dist/" "$root_dir/"
            ACTIVE_FRONTEND_ROOT="$root_dir"
            echo "Synced frontend to $root_dir"
          done

          if [ -f /etc/nginx/sites-enabled/ultra-connection ]; then
            python3 - <<'PY'
from pathlib import Path

config_path = Path("/etc/nginx/sites-enabled/ultra-connection")
config_text = config_path.read_text(encoding="utf-8")
updated_text = config_text.replace(
    "proxy_pass http://127.0.0.1:18000;",
    "proxy_pass http://127.0.0.1:8000;",
)
if updated_text != config_text:
    config_path.write_text(updated_text, encoding="utf-8")
    print("Updated ultra-connection upstream: 18000 -> 8000")
else:
    print("ultra-connection upstream already points to 8000")
PY
          fi

          nginx -t
          systemctl reload nginx

          backend_status_code=""
          for _ in $(seq 1 20); do
            backend_status_code="$(curl -s -o /tmp/auto-reg-backend-check.txt -w '%{http_code}' http://127.0.0.1:8000/api/auth/me || true)"
            if [ "$backend_status_code" = "401" ]; then
              break
            fi
            sleep 2
          done

          if [ "$backend_status_code" != "401" ]; then
            echo "Unexpected backend status: $backend_status_code"
            systemctl --no-pager --full status "$SERVICE_NAME" || true
            journalctl -u "$SERVICE_NAME" -n 100 --no-pager || true
            cat /tmp/auto-reg-backend-check.txt || true
            exit 1
          fi

          echo "APP_DIR=$APP_DIR"
          echo "FRONTEND_ROOTS=${FRONTEND_ROOTS[*]}"
          echo "ACTIVE_FRONTEND_ROOT=$ACTIVE_FRONTEND_ROOT"
          echo "SERVICE_NAME=$SERVICE_NAME"
          systemctl --no-pager --full status "$SERVICE_NAME" | sed -n '1,20p'
          REMOTE
